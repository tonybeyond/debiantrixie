# =============================================================================
# preseed.cfg — Installation automatisée Debian 13 Trixie
# =============================================================================
# Interface : en_US · Formats : fr_CH · Clavier : ch/fr · User : deby
#
# ⚠  Remplacer le hash du mot de passe avant usage :
#    echo "tonmotdepasse" | openssl passwd -6 -stdin
# =============================================================================

# ── Locale & Keyboard ─────────────────────────────────────────────────────────
d-i debian-installer/locale string en_US.UTF-8
d-i localechooser/supported-locales multiselect en_US.UTF-8, fr_CH.UTF-8
d-i keyboard-configuration/xkb-keymap select ch
d-i keyboard-configuration/variant string fr
d-i keyboard-configuration/ctrl-alt-backspace boolean true

# ── Network ───────────────────────────────────────────────────────────────────
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string deby-ws
d-i netcfg/get_domain string
d-i netcfg/wireless_wep string

# ── Mirror Debian ─────────────────────────────────────────────────────────────
d-i mirror/protocol string https
d-i mirror/country string CH
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string trixie

# ── Clock & Timezone ──────────────────────────────────────────────────────────
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Zurich
d-i clock-setup/ntp boolean true
d-i clock-setup/ntp-server string ntp.ch

# ── Partitionnement (LVM, disque le plus grand) ───────────────────────────────
d-i partman-auto/method string lvm
d-i partman-auto/disk string largest
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-md/confirm boolean true
d-i partman-basicfilesystems/no_swap boolean false

# ── Utilisateur ───────────────────────────────────────────────────────────────
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Deby
d-i passwd/username string deby
# Générer : echo "tonmotdepasse" | openssl passwd -6 -stdin
d-i passwd/user-password-crypted password $6$CHANGEME$PLEASE_REPLACE_WITH_REAL_HASH
d-i passwd/user-default-groups string sudo audio video cdrom plugdev netdev bluetooth

# ── Sélection des paquets ─────────────────────────────────────────────────────
# GNOME desktop complet + outils de base
tasksel tasksel/first multiselect gnome-desktop, standard
d-i pkgsel/include string \
    git curl wget ca-certificates apt-transport-https \
    gnupg unzip build-essential
d-i pkgsel/upgrade select safe-upgrade
popularity-contest popularity-contest/participate boolean false

# ── Bootloader ────────────────────────────────────────────────────────────────
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default

# ── Post-installation ─────────────────────────────────────────────────────────
# Lance post-install.sh après l'installation, en chroot.
# Logs dans /var/log/debiantrixie-setup.log
#
# Scripts à lancer MANUELLEMENT après le premier reboot :
#   bash /opt/debiantrixie/scripts/niri-setup.sh      (~20 min, build Rust)
#   bash /opt/debiantrixie/scripts/bash-setup.sh      (ble.sh)
#   sudo bash /opt/debiantrixie/scripts/citrix-setup.sh  (nécessite le .deb)
d-i preseed/late_command string \
    in-target git clone https://github.com/tonybeyond/debiantrixie.git /opt/debiantrixie ; \
    in-target bash -c "bash /opt/debiantrixie/scripts/post-install.sh > /var/log/debiantrixie-setup.log 2>&1"

# ── Reboot ────────────────────────────────────────────────────────────────────
d-i finish-install/reboot_in_progress note
